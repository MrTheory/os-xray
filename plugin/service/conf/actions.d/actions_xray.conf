[start]
# v3.0.0: %1 = inst_uuid (опционально; если не указан — запускает все инстансы)
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:start %1
type:script_output
message:Starting Xray

[stop]
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:stop %1
type:script_output
message:Stopping Xray

[restart]
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:restart %1
type:script_output
message:Restarting Xray

[reconfigure]
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:reconfigure %1
type:script_output
message:Reconfiguring Xray

[status]
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:status %1
type:script_output
message:Xray status

[statusall]
# v3.0.0: статус всех инстансов в формате JSON {inst_uuid: {status, xray_core, tun2socks}}
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:statusall
type:script_output
message:Xray status all instances

[log]
command:/usr/bin/tail
parameters:-n 150 /tmp/xray_syshook.log
type:script_output
message:Xray log

[xraylog]
# E3: лог xray-core (stderr/stdout, BUG-7 fix). Ротация через newsyslog (BUG-11 fix).
command:/usr/bin/tail
parameters:-n 200 /var/log/xray-core.log
type:script_output
message:Xray core log

[testconnect]
# BUG-4 FIX: порт читается из config.xml через PHP-скрипт.
command:/usr/local/opnsense/scripts/Xray/xray-testconnect.php
parameters:%1
type:script_output
message:Xray test connection

[validate]
# E5: сухой прогон конфига без применения.
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:validate %1
type:script_output
message:Validate Xray config

[ifstats]
# E4: статистика TUN-интерфейса для панели Diagnostics.
command:/usr/local/opnsense/scripts/Xray/xray-ifstats.php
parameters:%1
type:script_output
message:Xray TUN interface stats

[version]
command:/usr/local/opnsense/scripts/Xray/xray-service-control.php
parameters:version
type:script_output
message:Xray plugin version

[watchdog]
# E1: watchdog — запускается cron каждую минуту, итерирует все инстансы.
command:/usr/local/opnsense/scripts/Xray/xray-watchdog.php
parameters:
type:script_output
message:Xray watchdog check
